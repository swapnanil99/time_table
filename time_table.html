<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Swapnanil's Schedule</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090910;--panel:#0E0E18;--surf:#14141F;--surf2:#1A1A28;
  --brd:rgba(255,255,255,0.06);--brd2:rgba(255,255,255,0.13);
  --txt:#F2F0FA;--txt2:#9896B2;--txt3:#52506C;
  --gate:#42D4C8;--aiml:#3EC6A0;--dsa:#F97B5A;--job:#59A8F5;
  --proj:#A78BFA;--profile:#F5C842;--mock:#E06BCD;--rev:#8B7BF8;
  --note:#9898B8;--free:#1E1C34;--lunch:#2C2410;--sleep:#12102A;
  --r:14px;
  --ashadow:0 0 0 2px rgba(139,123,248,0.55),0 6px 28px rgba(139,123,248,0.22);
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);margin:0;padding:0}

/* ── GLOW ── */
.glow{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 55% 45% at 12% 8%,rgba(139,123,248,0.1) 0%,transparent 50%),
             radial-gradient(ellipse 45% 55% at 88% 90%,rgba(62,198,160,0.07) 0%,transparent 50%)}

/* ══ MOBILE-FIRST LAYOUT ══ */
.root{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--panel);border-bottom:1px solid var(--brd);padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.02em}
.brand-name span{background:linear-gradient(90deg,var(--rev),var(--aiml));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.clock-pill{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(139,123,248,0.13),rgba(62,198,160,0.07));border:1px solid rgba(139,123,248,0.28);border-radius:30px;padding:6px 14px}
.clock-time{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1}
.sbadge{font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;white-space:nowrap}
.sb-ok{background:rgba(62,198,160,0.14);color:var(--aiml);border:1px solid rgba(62,198,160,0.3)}
.sb-late{background:rgba(249,123,90,0.14);color:var(--dsa);border:1px solid rgba(249,123,90,0.3)}

/* DAY TABS — horizontal scroll */
.day-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 14px;border-radius:30px;border:1px solid transparent;background:transparent;color:var(--txt3);cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;flex-shrink:0;transition:all .14s}
.day-tab:hover{background:var(--surf);color:var(--txt2);border-color:var(--brd)}
.day-tab.active{background:linear-gradient(135deg,rgba(139,123,248,0.2),rgba(62,198,160,0.1));border-color:rgba(139,123,248,0.4);color:var(--txt)}
.tab-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700}
.tab-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.day-tab.active .tab-dot{background:var(--rev);box-shadow:0 0 6px rgba(139,123,248,.8)}
.day-tab.is-today .tab-dot{background:var(--rev);box-shadow:0 0 8px rgba(139,123,248,.9)}
.tab-now{font-size:8px;font-weight:800;background:var(--rev);color:#fff;border-radius:20px;padding:1px 6px}

/* NAV ROW */
.nav-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.nbtn{flex:1;padding:9px 0;border-radius:30px;border:1px solid var(--brd2);background:var(--surf2);color:var(--txt2);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .14s}
.nbtn:hover{background:var(--surf);color:var(--txt)}
.nbtn.today{background:linear-gradient(135deg,var(--rev),#4030B8);border-color:transparent;color:#fff}

/* DAY HEADER */
.day-header{padding:14px 16px 0}
.day-title{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.day-title span{background:linear-gradient(90deg,var(--rev),var(--aiml));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.date-line{font-size:12px;color:var(--txt3);margin-top:4px}
.gate-strip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--gate);background:rgba(66,212,200,0.09);border:1px solid rgba(66,212,200,0.25);border-radius:20px;padding:4px 12px;margin-top:8px}
.shift-line{font-size:11px;color:var(--txt3);margin-top:4px}

/* STATS ROW */
.stats-row{display:flex;gap:8px;padding:12px 16px 0;overflow-x:auto;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:9px 14px;flex-shrink:0;min-width:90px}
.stat-lbl{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--txt)}

/* LEGEND */
.legend-row{display:flex;gap:8px;padding:10px 16px 0;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.legend-row::-webkit-scrollbar{display:none}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt3);white-space:nowrap;flex-shrink:0}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* SCHEDULE BODY */
.sched{padding:14px 16px 40px;display:flex;flex-direction:column;gap:0}

.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);padding:16px 0 7px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--brd)}

/* BREAK DIVIDER */
.brk-div{display:flex;align-items:center;gap:15px;padding:12px 2px;margin:8px 0}
.brk-line{flex:1;height:2px;background:rgba(139,123,248,0.15);border-radius:2px}
.brk-txt{font-size:13px;color:var(--rev);white-space:nowrap;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:6px}

/* SLOT */
.slot{display:flex;gap:0;align-items:stretch;border-radius:var(--r);border:1px solid var(--brd);background:var(--surf);margin-bottom:6px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .14s,box-shadow .18s,transform .1s;-webkit-tap-highlight-color:transparent}
.slot-bar{width:5px;flex-shrink:0;border-radius:var(--r) 0 0 var(--r)}
.slot-inner{flex:1;padding:13px 14px 13px 13px;min-width:0}
.slot:hover:not(.active-now):not(.slot-done){border-color:var(--brd2)}
.slot:active:not(.active-now){transform:scale(0.99)}

/* ACTIVE */
.slot.active-now{border-color:rgba(255,77,77,0.4)!important;background:rgba(255,77,77,0.04)!important;box-shadow:0 0 20px rgba(255,77,77,0.1)}
.slot.active-now .s-title{color:#fff!important;font-size:16px!important}
.slot.active-now .s-time{color:#ff4d4d!important;font-weight:700}
.now-badge{position:absolute;right:12px;top:12px;font-size:10px;font-weight:800;color:#ff4d4d;background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.3);border-radius:6px;padding:3px 8px;letter-spacing:.06em;display:none;align-items:center;gap:5px;z-index:10}
.now-badge::before{content:'';width:6px;height:6px;background:#ff4d4d;border-radius:50%;animation:pulse 1s ease-in-out infinite}
.slot.active-now .now-badge{display:flex !important}
.prog-track{position:absolute;bottom:0;left:0;width:100%;height:6px;background:rgba(255,255,255,0.08);z-index:5}
.prog-bar{height:100%;background:linear-gradient(90deg, #ff4d4d, #f97b5a);border-radius:0 2px 2px 0;transition:width 0.5s ease;z-index:6}
.prog-text{position:absolute;right:12px;bottom:10px;font-size:11px;font-weight:800;color:#ff4d4d;letter-spacing:0.02em;z-index:10;text-shadow: 0 0 10px rgba(0,0,0,0.5)}

/* NEXT */
.slot.up-next{border-color:rgba(62,198,160,0.4)!important;background:rgba(62,198,160,0.08)!important}
.next-badge{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:800;color:var(--aiml);background:rgba(62,198,160,0.14);border:1px solid rgba(62,198,160,0.3);border-radius:20px;padding:3px 8px;display:none}
.slot.up-next .next-badge{display:block}

/* DONE */
.slot.slot-done{opacity:.28}
.slot.slot-done .s-title{text-decoration:line-through;text-decoration-color:rgba(255,255,255,0.2)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.s-time{font-size:12px;color:var(--txt3);margin-bottom:4px;font-variant-numeric:tabular-nums;line-height:1.3}
.s-title{font-size:15px;font-weight:600;color:var(--txt);line-height:1.3;padding-right:50px}
.s-sub{font-size:12px;color:var(--txt2);margin-top:4px;line-height:1.55}
.s-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:9px;font-weight:700;border-radius:20px;padding:2px 8px;letter-spacing:.04em}

/* slot bar colours */
.bar-gate{background:var(--gate)}
.bar-aiml{background:var(--aiml)}
.bar-dsa{background:var(--dsa)}
.bar-job{background:var(--job)}
.bar-proj{background:var(--proj)}
.bar-profile{background:var(--profile)}
.bar-mock{background:var(--mock)}
.bar-rev{background:var(--rev)}
.bar-note{background:var(--note)}
.bar-free{background:#4A4870}
.bar-lunch{background:#B89040}
.bar-sleep{background:#3A386A}
.bar-break{background:var(--surf2)}

/* slot bg colours */
.bg-gate{background:rgba(66,212,200,0.07);border-color:rgba(66,212,200,0.22)}
.bg-aiml{background:rgba(62,198,160,0.07);border-color:rgba(62,198,160,0.2)}
.bg-dsa{background:rgba(249,123,90,0.08);border-color:rgba(249,123,90,0.2)}
.bg-job{background:rgba(89,168,245,0.07);border-color:rgba(89,168,245,0.2)}
.bg-proj{background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.2)}
.bg-profile{background:rgba(245,200,66,0.07);border-color:rgba(245,200,66,0.2)}
.bg-mock{background:rgba(224,107,205,0.07);border-color:rgba(224,107,205,0.2)}
.bg-rev{background:rgba(139,123,248,0.08);border-color:rgba(139,123,248,0.2)}
.bg-note{background:rgba(152,152,184,0.06);border-color:rgba(152,152,184,0.14)}
.bg-free{background:var(--free);border-color:rgba(255,255,255,0.05)}
.bg-lunch{background:var(--lunch);border-color:rgba(200,160,60,0.2)}
.bg-sleep{background:var(--sleep);border-color:rgba(255,255,255,0.04);border-style:dashed}

/* tag colours */
.T-gate{background:rgba(66,212,200,0.15);color:var(--gate)}
.T-aiml{background:rgba(62,198,160,0.15);color:var(--aiml)}
.T-dsa{background:rgba(249,123,90,0.15);color:var(--dsa)}
.T-job{background:rgba(89,168,245,0.15);color:var(--job)}
.T-proj{background:rgba(167,139,250,0.15);color:var(--proj)}
.T-profile{background:rgba(245,200,66,0.15);color:var(--profile)}
.T-mock{background:rgba(224,107,205,0.15);color:var(--mock)}
.T-fixed{background:rgba(245,200,66,0.12);color:var(--profile);border:1px solid rgba(245,200,66,0.25)}
.T-break{background:rgba(255,255,255,0.05);color:var(--txt3)}
.T-note{background:rgba(152,152,184,0.12);color:var(--note)}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.modal-ov.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--brd2);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--brd2);border-radius:4px;margin:0 auto 18px}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--txt);margin-bottom:14px}
.modal label{display:block;font-size:10px;color:var(--txt2);margin:11px 0 4px;text-transform:uppercase;letter-spacing:.06em}
.modal input,.modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--brd2);border-radius:10px;padding:12px 14px;color:var(--txt);font-family:'Inter',sans-serif;font-size:15px;outline:none;-webkit-appearance:none;appearance:none}
.modal textarea{resize:vertical;min-height:80px}
.mact{display:flex;gap:8px;margin-top:20px}
.mbtn{flex:1;padding:14px;border-radius:40px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;-webkit-tap-highlight-color:transparent}
.mbtn.save{background:linear-gradient(135deg,var(--rev),#4030B8);color:#fff}
.mbtn.cancel{background:var(--surf2);color:var(--txt2);border:1px solid var(--brd)}
.mhint{font-size:11px;color:var(--txt3);text-align:center;margin-top:8px}

/* DESKTOP OVERRIDES */
@media(min-width:700px){
  html,body{height:100%;overflow:hidden}
  .root{flex-direction:row;height:100vh;overflow:hidden}
  .topbar{width:240px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--brd);border-bottom:none;position:static;overflow:hidden;padding:18px 14px}
  .topbar-row1{margin-bottom:12px}
  .brand-name{font-size:17px}
  .clock-pill{border-radius:var(--r);padding:10px 13px}
  .clock-time{font-size:22px}
  .day-tabs{flex-direction:column;overflow-x:hidden;overflow-y:auto;gap:2px;flex:1;padding-bottom:0}
  .day-tab{flex-direction:row;padding:9px 12px;border-radius:var(--r);gap:9px;justify-content:flex-start}
  .tab-dot{width:8px;height:8px}
  .tab-now{font-size:9px}
  .nav-row{margin-top:auto;padding-top:10px;border-top:1px solid var(--brd);margin-bottom:0}
  .desktop-stats{display:flex;flex-direction:column;gap:5px;padding-top:10px;border-top:1px solid var(--brd)}
  .desktop-legend{display:flex;flex-wrap:wrap;gap:5px;padding-top:10px;border-top:1px solid var(--brd);margin-top:4px}
  /* Main area */
  .main-desktop{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .day-header{padding:16px 24px 0;flex-shrink:0}
  .day-title{font-size:28px}
  .stats-row{display:none}
  .legend-row{display:none}
  .sched{flex:1;overflow-y:auto;padding:12px 24px 24px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-content:start}
  .sched-col{display:flex;flex-direction:column;gap:0}
  .modal-ov{align-items:center;padding:20px}
  .modal{border-radius:18px;max-width:440px;max-height:85vh;padding:26px}
  .modal-handle{display:none}
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="root">

<!-- TOP BAR / SIDEBAR -->
<div class="topbar" id="topbar">
  <div class="topbar-row1">
    <div class="brand-name">Swapnanil's <span>Schedule</span></div>
    <div class="clock-pill">
      <div class="clock-time" id="live-clock">12:00</div>
      <div id="shift-badge"></div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nbtn" onclick="prevDay()">←</button>
    <button class="nbtn today" onclick="goToday()">Today</button>
    <button class="nbtn" onclick="nextDay()">→</button>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
  <!-- desktop only extras -->
  <div class="desktop-stats" id="desktop-stats" style="display:none"></div>
  <div class="desktop-legend" id="desktop-legend" style="display:none"></div>
</div>

<!-- MAIN -->
<div class="main-desktop" id="main-area">
  <div class="day-header">
    <div class="day-title" id="day-title">—</div>
    <div class="date-line" id="date-line">—</div>
    <div id="gate-strip-el"></div>
    <div class="shift-line" id="shift-line"></div>
  </div>
  <div class="stats-row" id="stats-row"></div>
  <div class="legend-row" id="legend-row"></div>
  <div class="sched" id="sched"></div>
</div>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>✎ Edit Slot</h3>
    <label>Title</label><input type="text" id="e-title">
    <label>Details</label><textarea id="e-sub"></textarea>
    <label>Category</label>
    <select id="e-cat">
      <option value="gate">🟢 GATE Study</option>
      <option value="aiml">🟩 AI/ML</option>
      <option value="dsa">🟠 DSA</option>
      <option value="job">🔵 Job Search</option>
      <option value="proj">🟣 Backend / AI Project</option>
      <option value="profile">🟡 Profile & Portfolio</option>
      <option value="mock">🩷 Mock Interview</option>
      <option value="note">⬜ Notes / Planning</option>
      <option value="free">🌑 Free Time</option>
      <option value="lunch">🍱 Lunch / Fixed</option>
      <option value="sleep">🌙 Wind Down / Planning</option>
    </select>
    <div class="mact">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" onclick="saveEdit()">Save</button>
    </div>
    <div class="mhint">Changes saved for this session</div>
  </div>
</div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const GATE_T={
  0:'GATE subject mock + PYQ analysis',
  1:'Discrete Mathematics — sets, relations, logic, combinatorics',
  2:'Operating Systems — scheduling, memory, deadlock',
  3:'DBMS — normalization, SQL, ACID, indexing',
  4:'Computer Networks — OSI, TCP/IP, routing, DNS',
  5:'COA + Compiler Design (alternate weekly)',
  6:'Algorithms & TOC (alternate weekly)'
};
const AIML_T={
  1:'LLM basics — tokenization, attention, embeddings, transformers',
  2:'RAG pipeline — chunking, embedding, retrieval, reranking',
  3:'LangChain LCEL, chains, agents, tools, memory',
  4:'LangGraph — StateGraph, checkpointing, HITL, multi-agent',
  5:'Vector DBs — Chroma, Pinecone, Qdrant + hybrid search',
  6:'AI/ML weekly consolidation — connect all topics'
};
const DSA_N={1:'Arrays & Binary Search',2:'Linked Lists & Recursion',3:'Trees (BST/DFS/BFS)',4:'Graphs',5:'Dynamic Programming',6:'Strings & Stacks'};
const DSA_S={
  1:'Two pointer, sliding window, binary search template — 1–2 problems',
  2:'Fast/slow pointer, reverse, merge — 1–2 problems',
  3:'Inorder/preorder/BFS, LCA, max path sum — 1–2 problems',
  4:'BFS/DFS, topo sort, cycle detection — 1–2 problems',
  5:'Rotating: 1D DP → 2D/Grid → Knapsack → LCS/LIS',
  6:'Anagram, palindrome, monotonic stack — 2 timed problems'
};
const GATE_MOCK_T={
  0:'GATE mixed PYQ — 30 questions timed (1 hr)',
  1:'Discrete Math subject mock — 30 MCQs timed (1 hr)',
  2:'OS subject mock — 30 MCQs timed (1 hr)',
  3:'DBMS subject mock — 30 MCQs timed (1 hr)',
  4:'CN subject mock — 30 MCQs timed (1 hr)',
  5:'COA / Compiler subject mock — 30 MCQs timed (1 hr)',
  6:'Full mixed GATE mock — previous year questions (1 hr)'
};

function toMin(h,m){return h*60+m}
function fmt(min){
  min=((min%1440)+1440)%1440;
  const h=Math.floor(min/60),m=min%60;
  const hh=h%12===0?12:h%12,ap=h<12?'AM':'PM';
  return `${hh}:${m.toString().padStart(2,'0')} ${ap}`;
}
function rng(s,d){return fmt(s)+' – '+fmt(s+d)}
function nowMin(){const n=new Date();return toMin(n.getHours(),n.getMinutes())}

const DEFAULT_START=toMin(6,30);
const LUNCH_S=toMin(13,0),LUNCH_D=120;
const FREE_S=toMin(20,0),FREE_D=120;
const PAGE_LOAD_MIN=nowMin();

function getShift(){
  const nm=PAGE_LOAD_MIN;
  if(nm<=DEFAULT_START||nm>=toMin(23,0))return 0;
  return Math.min(nm-DEFAULT_START,30);
}

/* ── SLOT BUILDERS ── */
function slot(start,dur,title,sub,cat,tags,opts={}){
  return{start,dur,title,sub,cat,tags,isBreak:false,...opts};
}
function brk(start,dur,label){
  return{start,dur,title:label,sub:'',cat:'break',tags:[],isBreak:true};
}

function buildSlots(d){
  const shift=getShift();
  const arr=[];

  // Helper to handle day-relative slots
  const slot = (start, dur, title, sub, cat, tags, opts = {}) => ({
    start, dur, title, sub, cat, tags, isBreak: false, ...opts
  });
  const brk = (start, dur, label) => ({
    start, dur, title: label, sub: '', cat: 'break', tags: [], isBreak: true
  });

  // 1. Add Early Morning "Wrap-over" tasks (12 AM - 6:30 AM)
  const prevDayIdx = (d + 6) % 7;
  // These tasks happen after 12 AM of the current day calendar-wise
  arr.push(slot(10,30,'GATE mock analysis (from '+DAYS[prevDayIdx]+')','Previous night\'s mock review.','gate',['GATE','Analysis']));
  arr.push(slot(40,30,'Make plan for day','Sleep & recharge.','sleep',['Planning','Notes']));

  // 2. Regular Morning schedule (Starts at 6:30 AM shifted)
  let c = DEFAULT_START + shift;
  const sat = d === 6;

  if(d===0){
    // SUNDAY — specific routine
    c = toMin(7,0);
    arr.push(slot(c,60,'GATE CS — morning revision','Saptaher weakest subject er notes re-read...','gate',['GATE'])); c+=60;
    arr.push(brk(c,20,'☕ Break')); c+=20;
    arr.push(slot(c,90,'AI/ML weekly revision','Saptaher AI/ML topics consolidate koro...','aiml',['AI/ML'])); c+=90;
    arr.push(brk(c,20,'🧘 Break')); c+=20;
    arr.push(slot(c,60,'DSA — weak topic revision','Saptaher DSA te ki bhul holo...','dsa',['DSA'])); c+=60;
    arr.push(brk(c,20,'🚶 Break')); c+=20;
    arr.push(slot(c,60,'Job applications','Weekend applications, LinkedIn activity...','job',['Job Search'])); c+=60;
    arr.push(slot(LUNCH_S,LUNCH_D,'Lunch break','খাওয়া, 20 min nap. FIXED 1–3 PM','lunch',['FIXED'],{fixed:true}));
    c=LUNCH_S+LUNCH_D;
    arr.push(slot(c,90,'Project review & planning','Saptaher project progress review...','proj',['Backend Project'])); c+=90;
    arr.push(brk(c,20,'🧃 Break')); c+=20;
    arr.push(slot(c,60,'Portfolio & profile update','GitHub contributions, portfolio site...','profile',['Profile Build'])); c+=60;
    arr.push(brk(c,20,'☕ Break')); c+=20;
    arr.push(slot(c,60,'Next week planning','আগামী সপ্তাহের targets set করো।','note',['Planning'])); c+=60;
    arr.push(brk(c,20,'🚶 Break')); c+=20;
    if(c<FREE_S){ arr.push(slot(c,FREE_S-c,'Weekly review','Honest self-assessment.','note',['Notes'])); }
    arr.push(slot(FREE_S,FREE_D,'Free time — no study','Dinner, family.','free',['FIXED'],{fixed:true}));
    let gS = FREE_S + FREE_D;
    arr.push(slot(gS,60,'GATE CS — night deep study',GATE_T[0],'gate',['GATE']));
    arr.push(brk(gS+60,10,'💧 Break'));
    arr.push(slot(gS+70,60,'GATE subject mock test',GATE_MOCK_T[0],'gate',['GATE','Mock Test']));
    return arr;
  }

  // MON-SAT Normal logic
  arr.push(slot(c,60,'GATE CS — morning revision',GATE_T[d],'gate',['GATE'],{shifted:shift>0})); c+=60;
  arr.push(brk(c,20,'☕ Break')); c+=20;
  arr.push(slot(c,120,'AI/ML deep study',AIML_T[d]||'','aiml',['AI/ML'],{shifted:shift>0})); c+=120;
  arr.push(brk(c,20,'🧘 Break')); c+=20;
  arr.push(slot(c,60,'DSA — '+DSA_N[d],DSA_S[d]||'','dsa',['DSA'],{shifted:shift>0})); c+=60;
  arr.push(brk(c,20,'🚶 Break')); c+=20;
  const jobDur=LUNCH_S-c;
  if(jobDur>0){ arr.push(slot(c,jobDur,'Job search & applications','Apply 3–5 roles.','job',['Job Search'],{shifted:shift>0})); }
  arr.push(slot(LUNCH_S,LUNCH_D,'Lunch break','খাওয়া, 20 min nap.','lunch',['FIXED'],{fixed:true}));
  c=LUNCH_S+LUNCH_D;
  arr.push(slot(c,90,sat?'Project wrap-up':'Backend / AI project build',sat?'Weekly commit':'Django/LangGraph build','proj',['Backend Project'])); c+=90;
  arr.push(brk(c,20,'🧃 Break')); c+=20;
  arr.push(slot(c,45,'Profile & portfolio build','LinkedIn/GitHub updates.','profile',['Profile Build'])); c+=45;
  arr.push(brk(c,20,'☕ Break')); c+=20;
  arr.push(slot(c,60,sat?'Full weekly mock interview':'Mock interview','Self-mock.','mock',['Mock Interview'])); c+=60;
  arr.push(slot(c,30,'Mock interview analysis','Recording review.','mock',['Analysis'])); c+=30;
  arr.push(brk(c,20,'🚶 Break')); c+=20;
  if(c<FREE_S){ arr.push(slot(c,FREE_S-c,sat?'Weekly review':'Daily review','Check progress.','note',['Notes'])); }
  arr.push(slot(FREE_S,FREE_D,'Free time — no study','Dinner & family.','free',['FIXED'],{fixed:true}));
  let gS = FREE_S+FREE_D;
  arr.push(slot(gS,60,'GATE CS — night deep study',GATE_T[d],'gate',['GATE']));
  arr.push(brk(gS+60,10,'💧 Break'));
  arr.push(slot(gS+70,60,'GATE subject mock test',GATE_MOCK_T[d],'gate',['GATE','Mock Test']));
  return arr;
}


/* ── ACTIVE DETECTION ── */
function getActiveNext(slots){
  const nm = nowMin();
  // Adjust current time for tasks that started before midnight but are effectively early morning
  const adjustedNow = nm < DEFAULT_START ? nm + 1440 : nm;
  
  let ai=-1,ni=-1;
  for(let i=0;i<slots.length;i++){
    const s=slots[i];
    if(s.isBreak||s.dur<=0)continue;
    
    // Check with standard time and wrapped time for early morning tasks
    const start = s.start;
    const end = s.start + s.dur;
    
    if((nm >= start && nm < end) || (adjustedNow >= start && adjustedNow < end)){
      ai=i;
      break;
    }
  }
  
  if(ai>=0){
    for(let j=ai+1;j<slots.length;j++){
      if(!slots[j].isBreak&&slots[j].dur>0){ni=j;break}
    }
  } else {
    for(let j=0;j<slots.length;j++){
      const start = slots[j].start;
      if(!slots[j].isBreak && slots[j].dur>0 && (start > nm || (nm < DEFAULT_START && start > adjustedNow))){
        ni=j;
        break;
      }
    }
  }
  return{ai,ni};
}
function progress(s){
  const now = nowMin();
  const elapsed = now - s.start;
  const pct = (elapsed / s.dur) * 100;
  return Math.min(100, Math.max(0, pct));
}

/* ── TAG CLASS ── */
function tagCls(t){
  const map={
    'GATE':'T-gate','Mock Test':'T-gate','Analysis':'T-gate',
    'AI/ML':'T-aiml','DSA':'T-dsa','Job Search':'T-job',
    'Backend Project':'T-proj','AI Project':'T-proj',
    'Profile Build':'T-profile','Mock Interview':'T-mock',
    'Planning':'T-note','Notes':'T-note',
    'FIXED':'T-fixed','Break':'T-break','Light':'T-note'
  };
  return map[t]||'';
}

/* ── STATE ── */
let curDay=new Date().getDay();
let overrides={};

/* ── RENDER ── */
const isDesktop=()=>window.innerWidth>=700;

function render(){
  const today=new Date().getDay();
  const d=new Date();
  d.setDate(d.getDate()+(curDay-today));
  const dStr=d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const shift=getShift();
  const isToday=curDay===today;
  const desk=isDesktop();

  // Header
  const dTitle=document.getElementById('day-title');
  dTitle.innerHTML=`${DAYS[curDay]}${isToday?' <span>— Today</span>':''}`;
  document.getElementById('date-line').textContent=dStr+(isToday?' · live':'');

  // Gate strip
  const gsEl=document.getElementById('gate-strip-el');
  gsEl.innerHTML=curDay>0?`<div class="gate-strip">🟢 GATE tonight: ${GATE_T[curDay].split('—')[0].trim()}</div>`:'';

  // Shift info
  const slEl=document.getElementById('shift-line');
  if(isToday&&curDay>0){
    slEl.textContent=shift>0
      ?`⚡ Mac opened ${fmt(PAGE_LOAD_MIN)} — schedule shifted +${shift} min`
      :`✓ On-time — 6:30 AM schedule`;
  }else slEl.textContent='';

  // Shift badge
  const sbEl=document.getElementById('shift-badge');
  if(isToday&&curDay>0){
    sbEl.innerHTML=shift>0
      ?`<div class="sbadge sb-late">+${shift}m</div>`
      :`<div class="sbadge sb-ok">✓</div>`;
  }else sbEl.innerHTML='';

  // Tabs
  const te=document.getElementById('day-tabs');
  te.innerHTML='';
  DAYS.forEach((nm,i)=>{
    const b=document.createElement('button');
    b.className='day-tab'+(i===curDay?' active':'')+(i===today?' is-today':'');
    b.innerHTML=`<span class="tab-dot"></span><span class="tab-name">${desk?nm:nm.slice(0,3)}</span>${i===today?'<span class="tab-now">NOW</span>':''}`;
    b.onclick=()=>{curDay=i;render()};
    te.appendChild(b);
  });

  // Stats
  const LEGEND_DATA=[
    {c:'#42D4C8',l:'GATE'},{c:'#3EC6A0',l:'AI/ML'},{c:'#F97B5A',l:'DSA'},
    {c:'#59A8F5',l:'Job'},{c:'#A78BFA',l:'Project'},{c:'#F5C842',l:'Profile'},
    {c:'#E06BCD',l:'Mock'},{c:'#9898B8',l:'Notes'},
  ];
  if(desk){
    const ds=document.getElementById('desktop-stats');
    const dl=document.getElementById('desktop-legend');
    ds.style.display=curDay>0?'flex':'none';
    dl.style.display='flex';
    if(curDay>0){
      ds.innerHTML=`
        <div class="stat-row" style="margin-bottom:4px"><span class="stat-lbl">Study</span><span class="stat-val">~10h</span></div>
        <div class="stat-row" style="margin-bottom:4px"><span class="stat-lbl">DSA</span><span class="stat-val" style="font-size:12px">${curDay>0?DSA_N[curDay]:'—'}</span></div>
        <div class="stat-row"><span class="stat-lbl">GATE</span><span class="stat-val" style="font-size:11px">${GATE_T[curDay].split('—')[0].trim()}</span></div>`;
    }
    dl.innerHTML=LEGEND_DATA.map(x=>`<div class="leg"><div class="leg-dot" style="background:${x.c}"></div>${x.l}</div>`).join('');
  }else{
    document.getElementById('stats-row').innerHTML=curDay>0?`
      <div class="stat-card"><div class="stat-lbl">Study</div><div class="stat-val">~10h</div></div>
      <div class="stat-card"><div class="stat-lbl">DSA</div><div class="stat-val" style="font-size:12px">${DSA_N[curDay]||'—'}</div></div>
      <div class="stat-card"><div class="stat-lbl">GATE</div><div class="stat-val" style="font-size:12px">${GATE_T[curDay].split('—')[0].trim()}</div></div>`:'';
    document.getElementById('legend-row').innerHTML=LEGEND_DATA.map(x=>`<div class="leg"><div class="leg-dot" style="background:${x.c}"></div>${x.l}</div>`).join('');
  }

  // Schedule
  const schedEl=document.getElementById('sched');
  let allSlots=buildSlots(curDay).map((s,i)=>{
    const ov=overrides[`${curDay}-${i}`]||{};
    return{...s,...ov,_idx:i,_raw:s};
  });

  // Sort slots so that if it's currently between midnight and the morning start (e.g. 12am - 6:30am),
  // the tasks meant for those hours appear at the top of the list.
  allSlots.sort((a, b) => {
    const timeA = a.start < DEFAULT_START ? a.start + 1440 : a.start;
    const timeB = b.start < DEFAULT_START ? b.start + 1440 : b.start;
    return timeA - timeB;
  });
  
  const now = nowMin();
  if (now < DEFAULT_START) {
    // Bring early morning tasks (00:00 to 06:30) to the very top visually
    const midnightTasks = allSlots.filter(s => s.start < DEFAULT_START);
    const regularTasks = allSlots.filter(s => s.start >= DEFAULT_START);
    allSlots = [...midnightTasks, ...regularTasks];
  }

  const{ai,ni}=isToday?getActiveNext(allSlots):{ai:-1,ni:-1};

  function renderSlotHTML(slot,gi,side=''){
    if(slot.isBreak){
      const sc=desk?(side==='L'?'brk-div-left':'brk-div-right'):'';
      return`<div class="brk-div ${sc}"><div class="brk-line"></div><div class="brk-txt">${slot.title} · ${slot.dur} min</div><div class="brk-line"></div></div>`;
    }
    const isActive=gi===ai&&isToday;
    const isNext=gi===ni&&isToday;
    const isDone=isToday&&gi<ai&&ai>=0;
    const prog=isActive?progress(slot._raw||slot):0;
    const cat=slot.cat||'note';
    const tags=(slot.tags||[]).map(t=>{const c=tagCls(t);return c?`<span class="tag ${c}">${t}</span>`:''}).join('');
    let cls=`slot bg-${cat}`;
    if(isActive)cls+=' active-now';
    else if(isNext)cls+=' up-next';
    else if(isDone)cls+=' slot-done';
    if(desk) cls+=side==='L'?' slot-left':' slot-right';
    const timeStr=slot.dur<=0?'All day':rng((slot._raw||slot).start,slot.dur);
    return`<div class="${cls}" onclick="openEdit(${gi})">
      <div class="slot-bar bar-${cat}"></div>
      <div class="slot-inner">
        <div class="s-time">${timeStr}</div>
        <div class="s-title">${slot.title}</div>
        ${slot.sub?`<div class="s-sub">${slot.sub}</div>`:''}
        ${tags?`<div class="s-tags">${tags}</div>`:''}
      </div>
      <div class="now-badge">LIVE</div>
      <div class="next-badge">NEXT</div>
      ${isActive?`
        <div class="prog-text">${Math.round(prog)}% done</div>
        <div class="prog-track"><div class="prog-bar" style="width:${prog}%"></div></div>
      `:''}
    </div>`;
  }

  if(desk){
    // Two-column grid — left: before+lunch, right: after lunch
    const lIdx=allSlots.findIndex(s=>s.fixed&&s.cat==='lunch');
    const leftSlots=allSlots.slice(0,lIdx+1);
    const rightSlots=allSlots.slice(lIdx+1);
    let html=`<div class="sched-col"><div class="sec-lbl">Morning & Forenoon</div>`;
    html+=leftSlots.map((s,i)=>renderSlotHTML(s,i,'L')).join('');
    html+=`</div><div class="sched-col"><div class="sec-lbl">Afternoon & Night</div>`;
    html+=rightSlots.map((s,i)=>renderSlotHTML(s,lIdx+1+i,'R')).join('');
    html+=`</div>`;
    schedEl.innerHTML=html;
  }else{
    // Single column
    const sections=[
      {label:'Morning & Forenoon',test:s=>!s.fixed||(s.fixed&&s.cat==='lunch'),till:'lunch'},
      {label:'Afternoon & Night',test:s=>true,from:'afterlunch'}
    ];
    let html='';
    const lIdx=allSlots.findIndex(s=>s.fixed&&s.cat==='lunch');
    html+=`<div class="sec-lbl">Morning & Forenoon</div>`;
    allSlots.slice(0,lIdx+1).forEach((s,i)=>{ html+=renderSlotHTML(s,i,''); });
    html+=`<div class="sec-lbl">Afternoon & Night</div>`;
    allSlots.slice(lIdx+1).forEach((s,i)=>{ html+=renderSlotHTML(s,lIdx+1+i,''); });
    schedEl.innerHTML=html;
  }

  setTimeout(()=>{
    const el=document.querySelector('.active-now') || document.querySelector('.up-next');
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },100);
}

function goToday(){curDay=new Date().getDay();render()}
function nextDay(){curDay=(curDay+1)%7;render()}
function prevDay(){curDay=(curDay+6)%7;render()}

let eIdx=null;
function openEdit(idx){
  eIdx=idx;
  const slots=buildSlots(curDay);
  const raw=slots[idx];
  if(!raw||raw.isBreak)return;
  const ov=overrides[`${curDay}-${idx}`]||{};
  const s={...raw,...ov};
  document.getElementById('e-title').value=s.title;
  document.getElementById('e-sub').value=s.sub||'';
  document.getElementById('e-cat').value=s.cat||'note';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
function saveEdit(){
  overrides[`${curDay}-${eIdx}`]={
    title:document.getElementById('e-title').value,
    sub:document.getElementById('e-sub').value,
    cat:document.getElementById('e-cat').value,
  };
  closeModal();render();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});

// Setup desktop extras visibility
function setupLayout(){
  const desk=isDesktop();
  document.getElementById('desktop-stats').style.display=desk&&curDay>0?'flex':'none';
  document.getElementById('desktop-legend').style.display=desk?'flex':'none';
}

let lastRendMin=-1;
function tick(){
  const n=new Date();
  const h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  const hh=h%12===0?12:h%12,ap=h<12?'AM':'PM';
  document.getElementById('live-clock').textContent=`${hh}:${m.toString().padStart(2,'0')} ${ap}`;
  const nm=toMin(h,m);
  
  // Force update UI every minute or if day changes
  if(nm!==lastRendMin){
    lastRendMin=nm;
    // Always render if it's "Today" to update progress bars/LIVE status
    if(curDay===new Date().getDay()) render();
  }
  
  if(h===0&&m===0&&s<3){curDay=new Date().getDay();render();}
}
setInterval(tick,1000);tick();

document.addEventListener('keydown',e=>{
  if(document.getElementById('modal').classList.contains('open'))return;
  if(e.key==='ArrowRight')nextDay();
  if(e.key==='ArrowLeft')prevDay();
  if(e.key==='t'||e.key==='T')goToday();
});

window.addEventListener('resize',()=>render());
render();
</script>
